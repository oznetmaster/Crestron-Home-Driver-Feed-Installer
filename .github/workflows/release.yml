name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing tag to publish, for example v1.0.0. Leave empty to run build only.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore .\CrestronHomeDriverFeedInstaller.slnx

      - name: Build bootstrapper
        run: dotnet build .\installer\CrestronHomeDriverFeedInstaller.Bootstrapper.wixproj -c Release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Crestron Home Driver Feed Installer Release Assets
          path: installer\bin\Release\Crestron Home Driver Feed Installer.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
          RELEASE_ASSET_PATH: .\installer\bin\Release\Crestron Home Driver Feed Installer.exe
          RELEASE_ASSET_NAME: Crestron Home Driver Feed Installer.exe
        shell: pwsh
        run: |
          gh release create "$env:RELEASE_TAG" --repo "$env:GITHUB_REPOSITORY" --generate-notes 2>$null

          $release = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:RELEASE_TAG" | ConvertFrom-Json
          $existingAssets = @($release.assets | Where-Object { $_.name -in @($env:RELEASE_ASSET_NAME, 'Crestron.Home.Driver.Feed.Installer.exe') })

          foreach ($asset in $existingAssets) {
            gh api --method DELETE "repos/$env:GITHUB_REPOSITORY/releases/assets/$($asset.id)"
          }

          $uploadUrl = ($release.upload_url -replace '\{\?name,label\}$', '')
          $assetName = [Uri]::EscapeDataString($env:RELEASE_ASSET_NAME)
          $assetLabel = [Uri]::EscapeDataString($env:RELEASE_ASSET_NAME)

          Invoke-RestMethod \
            -Method Post \
            -Uri "$uploadUrl?name=$assetName&label=$assetLabel" \
            -Headers @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = 'application/vnd.github+json'; 'Content-Type' = 'application/octet-stream' } \
            -InFile $env:RELEASE_ASSET_PATH

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore .\CrestronHomeDriverFeedInstaller.slnx

      - name: Build bootstrapper
        run: dotnet build .\installer\CrestronHomeDriverFeedInstaller.Bootstrapper.wixproj -c Release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Crestron Home Driver Feed Installer Release Assets
          path: installer\bin\Release\Crestron Home Driver Feed Installer.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer\bin\Release\Crestron Home Driver Feed Installer.exe
          generate_release_notes: true
